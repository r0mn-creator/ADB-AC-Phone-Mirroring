; Phone Mirror — CSP Touchscreen App Manifest
; =============================================
; This tells CSP how to load the Phone Mirror app in the
; Android Auto-style in-car touchscreen display.
;
; Goes in: <AC_ROOT>/extension/lua/joypad-assist/android_auto/apps/mirror/manifest.ini

[ABOUT]
NAME = ADB Phone                                                         ; App name shown in launcher
AUTHOR = x4fab                                                           ; Original author
VERSION = 2.0                                                            ; Version number
DESCRIPTION = Mirror and control your Android phone from inside Assetto Corsa  ; Description
